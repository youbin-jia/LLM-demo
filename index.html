<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飞书文档AI助手</title>
    <!-- Tailwind CSS v3 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- 统一的 Tailwind 配置 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#007AFF',
                        secondary: '#5856D6',
                        success: '#34C759',
                        warning: '#FF9500',
                        danger: '#FF3B30',
                        light: '#F2F2F7',
                        dark: '#1C1C1E',
                        'primary-light': '#E5F1FF',
                        'primary-dark': '#0051D5',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    boxShadow: {
                        'card': '0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06)',
                        'card-hover': '0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05)',
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .glass-effect {
                background: rgba(255, 255, 255, 0.7);
                backdrop-filter: blur(10px);
                -webkit-backdrop-filter: blur(10px);
            }
            .btn-primary {
                @apply bg-primary text-white font-medium py-3 px-6 rounded-xl shadow-md hover:bg-primary-dark transition-all duration-300 transform hover:-translate-y-0.5 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-opacity-50;
            }
            .btn-secondary {
                @apply bg-white text-primary font-medium py-3 px-6 rounded-xl shadow-md border border-primary hover:bg-primary-light transition-all duration-300 transform hover:-translate-y-0.5 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-opacity-50;
            }
            .btn-feature {
                @apply flex items-center justify-center gap-3 bg-white text-primary font-medium py-4 px-6 rounded-xl shadow-md border border-gray-200 hover:bg-primary-light transition-all duration-300 transform hover:-translate-y-0.5 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-opacity-50;
            }
            .btn-feature.active {
                @apply bg-primary text-white border-primary;
            }
            .input-primary {
                @apply w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all duration-300;
            }
            .sidebar {
                @apply w-72 bg-white shadow-lg rounded-2xl p-5 flex flex-col gap-4 h-full;
            }
            .main-content {
                @apply flex-1 bg-gray-50 rounded-2xl p-6 overflow-y-auto;
            }
            .document-editor {
                @apply bg-white rounded-xl shadow-md p-6 min-h-[500px] border border-gray-200 focus:outline-none focus:ring-2 focus:ring-primary transition-all duration-300;
            }
            .tooltip {
                @apply invisible absolute bg-dark text-white text-xs rounded py-1 px-2 -mt-8 opacity-0 transition-opacity duration-300;
            }
            .has-tooltip:hover .tooltip {
                @apply visible opacity-100 z-50;
            }
            .loading-dots span {
                @apply inline-block w-2 h-2 bg-primary rounded-full mx-0.5 animate-pulse-slow;
            }
            .loading-dots span:nth-child(2) {
                @apply animate-pulse-slow delay-150;
            }
            .loading-dots span:nth-child(3) {
                @apply animate-pulse-slow delay-300;
            }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans">
    <div class="container mx-auto px-4 py-8 max-w-7xl">
        <!-- 顶部导航栏 -->
        <header class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-primary flex items-center justify-center text-white">
                    <i class="fa fa-paper-plane-o text-xl"></i>
                </div>
                <h1 class="text-2xl font-bold text-gray-800">飞书文档</h1>
            </div>
            <div class="flex items-center gap-4">
                <button class="btn-secondary">
                    <i class="fa fa-share-alt mr-2"></i>分享
                </button>
                <button class="btn-primary">
                    <i class="fa fa-save mr-2"></i>保存
                </button>
                <div class="w-10 h-10 rounded-full bg-gray-300 overflow-hidden">
                    <img src="https://p3-doubao-search-sign.byteimg.com/labis/56da99f6c8afb942f02ca4174fddf23b~tplv-be4g95zd3a-image.jpeg?lk3s=feb11e32&x-expires=1787932974&x-signature=mIQ8TIF%2FeuJZHrolLC%2Be9E80GyE%3D" alt="用户头像" class="w-full h-full object-cover">
                </div>
            </div>
        </header>

        <!-- 主要内容区域 -->
        <main class="flex gap-6 h-[calc(100vh-180px)]">
            <!-- 左侧文档编辑区 -->
            <div class="main-content">
                <div class="mb-6">
                    <input type="text" placeholder="文档标题" class="text-2xl font-bold border-none border-b-2 border-gray-300 focus:border-primary focus:outline-none pb-2 w-full mb-4">
                    <div class="flex items-center text-sm text-gray-500 gap-4">
                        <span><i class="fa fa-user-o mr-1"></i> 张三</span>
                        <span><i class="fa fa-clock-o mr-1"></i> 刚刚编辑</span>
                        <span><i class="fa fa-eye mr-1"></i> 12人查看</span>
                    </div>
                </div>
                <div id="document-editor" class="document-editor" contenteditable="true">
                    <p>开始编写文档内容...</p>
                    <p><br></p>
                    <p>在这里输入的内容可以通过AI助手进行增强和优化。</p>
                    <p><br></p>
                    <p>试试选中文本，然后使用右侧的AI助手功能！</p>
                </div>
            </div>

            <!-- 右侧AI助手面板 -->
            <div class="sidebar">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-xl font-bold text-gray-800">AI助手</h2>
                    <button class="text-gray-500 hover:text-primary transition-colors">
                        <i class="fa fa-cog"></i>
                    </button>
                </div>

                <!-- 功能按钮 -->
                <div class="flex flex-col gap-3 mb-6">
                    <button id="btn-generate" class="btn-feature active" onclick="switchFeature('generate')">
                        <i class="fa fa-pencil text-xl"></i>
                        <span>文本生成</span>
                    </button>
                    <button id="btn-extract" class="btn-feature" onclick="switchFeature('extract')">
                        <i class="fa fa-filter text-xl"></i>
                        <span>信息提取</span>
                    </button>
                    <button id="btn-translate" class="btn-feature" onclick="switchFeature('translate')">
                        <i class="fa fa-language text-xl"></i>
                        <span>多语言翻译</span>
                    </button>
                    <button id="btn-format" class="btn-feature" onclick="switchFeature('format')">
                        <i class="fa fa-magic text-xl"></i>
                        <span>格式优化</span>
                    </button>
                </div>

                <!-- 功能内容区域 -->
                <div class="flex-1">
                    <!-- 文本生成功能 -->
                    <div id="feature-generate" class="feature-content">
                        <h3 class="text-lg font-semibold text-gray-800 mb-3">文本生成</h3>
                        <p class="text-sm text-gray-600 mb-4">根据提示生成文档内容，支持多种类型的文本创作。</p>
                        
                        <div class="mb-4">
                            <label class="block text-sm font-medium text-gray-700 mb-2">选择生成类型</label>
                            <select class="input-primary">
                                <option>总结</option>
                                <option>大纲</option>
                                <option>邮件</option>
                                <option>报告</option>
                                <option>创意文案</option>
                                <option>其他</option>
                            </select>
                        </div>
                        
                        <div class="mb-4">
                            <label class="block text-sm font-medium text-gray-700 mb-2">输入提示</label>
                            <textarea class="input-primary" rows="4" placeholder="请输入你想要生成的内容提示..."></textarea>
                        </div>
                        
                        <button id="generate-btn" class="btn-primary w-full" onclick="generateContent()">
                            <i class="fa fa-magic mr-2"></i>生成内容
                        </button>
                    </div>

                    <!-- 信息提取功能 -->
                    <div id="feature-extract" class="feature-content hidden">
                        <h3 class="text-lg font-semibold text-gray-800 mb-3">信息提取</h3>
                        <p class="text-sm text-gray-600 mb-4">从选中的文本中提取关键信息和要点。</p>
                        
                        <div class="mb-4">
                            <label class="block text-sm font-medium text-gray-700 mb-2">提取类型</label>
                            <select class="input-primary">
                                <option>关键要点</option>
                                <option>实体识别</option>
                                <option>时间线</option>
                                <option>数据统计</option>
                            </select>
                        </div>
                        
                        <div class="mb-4">
                            <p class="text-sm text-gray-500 mb-2">已选中的文本</p>
                            <div class="bg-gray-100 p-3 rounded-lg text-sm text-gray-700 max-h-32 overflow-y-auto">
                                请在文档中选择要提取信息的文本...
                            </div>
                        </div>
                        
                        <button class="btn-primary w-full" onclick="extractContent()">
                            <i class="fa fa-filter mr-2"></i>提取信息
                        </button>
                    </div>

                    <!-- 翻译功能 -->
                    <div id="feature-translate" class="feature-content hidden">
                        <h3 class="text-lg font-semibold text-gray-800 mb-3">多语言翻译</h3>
                        <p class="text-sm text-gray-600 mb-4">将选中的文本翻译成其他语言。</p>
                        
                        <div class="mb-4">
                            <label class="block text-sm font-medium text-gray-700 mb-2">目标语言</label>
                            <select class="input-primary">
                                <option>中文</option>
                                <option>英语</option>
                                <option>日语</option>
                                <option>韩语</option>
                                <option>法语</option>
                                <option>德语</option>
                                <option>西班牙语</option>
                            </select>
                        </div>
                        
                        <div class="mb-4">
                            <p class="text-sm text-gray-500 mb-2">已选中的文本</p>
                            <div class="bg-gray-100 p-3 rounded-lg text-sm text-gray-700 max-h-32 overflow-y-auto">
                                请在文档中选择要翻译的文本...
                            </div>
                        </div>
                        
                        <button class="btn-primary w-full" onclick="translateContent()">
                            <i class="fa fa-language mr-2"></i>开始翻译
                        </button>
                    </div>

                    <!-- 格式优化功能 -->
                    <div id="feature-format" class="feature-content hidden">
                        <h3 class="text-lg font-semibold text-gray-800 mb-3">格式优化</h3>
                        <p class="text-sm text-gray-600 mb-4">自动优化文档格式，提升专业性和可读性。</p>
                        
                        <div class="space-y-3 mb-4">
                            <div class="flex items-center">
                                <input type="checkbox" id="format-heading" class="mr-2" checked>
                                <label for="format-heading" class="text-sm text-gray-700">优化标题层级</label>
                            </div>
                            <div class="flex items-center">
                                <input type="checkbox" id="format-paragraph" class="mr-2" checked>
                                <label for="format-paragraph" class="text-sm text-gray-700">调整段落结构</label>
                            </div>
                            <div class="flex items-center">
                                <input type="checkbox" id="format-bullet" class="mr-2" checked>
                                <label for="format-bullet" class="text-sm text-gray-700">添加项目符号</label>
                            </div>
                            <div class="flex items-center">
                                <input type="checkbox" id="format-style" class="mr-2">
                                <label for="format-style" class="text-sm text-gray-700">统一文字样式</label>
                            </div>
                        </div>
                        
                        <button class="btn-primary w-full" onclick="formatContent()">
                            <i class="fa fa-magic mr-2"></i>优化格式
                        </button>
                    </div>
                </div>

                <!-- 底部操作区 -->
                <div class="mt-6 pt-4 border-t border-gray-200">
                    <button class="text-sm text-gray-500 hover:text-primary transition-colors flex items-center gap-1">
                        <i class="fa fa-question-circle"></i>
                        <span>使用帮助</span>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- 结果弹窗 -->
    <div id="result-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-2xl p-6 w-full max-w-2xl max-h-[80vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modal-title" class="text-xl font-bold text-gray-800">AI生成结果</h3>
                <button onclick="closeModal()" class="text-gray-500 hover:text-gray-700">
                    <i class="fa fa-times text-xl"></i>
                </button>
            </div>
            <div id="modal-content" class="prose max-w-none">
                <!-- 结果内容将在这里动态插入 -->
            </div>
            <div class="mt-6 flex gap-3">
                <button onclick="closeModal()" class="btn-secondary flex-1">取消</button>
                <button onclick="applyChanges()" class="btn-primary flex-1">应用到文档</button>
            </div>
        </div>
    </div>

    <!-- 加载中弹窗 -->
    <div id="loading-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-2xl p-8 w-full max-w-md flex flex-col items-center">
            <div class="w-16 h-16 rounded-full bg-primary-light flex items-center justify-center mb-4">
                <div class="loading-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
            <h3 id="loading-title" class="text-lg font-semibold text-gray-800 mb-2">AI正在处理</h3>
            <p id="loading-message" class="text-gray-600 text-center">请稍候，AI正在生成内容...</p>
        </div>
    </div>

    <script>
        // 全局变量
        let currentFeature = 'generate';
        let selectedText = '';
        let aiResults = '';

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 监听文本选择事件
            document.getElementById('document-editor').addEventListener('mouseup', function() {
                selectedText = window.getSelection().toString().trim();
                if (selectedText) {
                    updateSelectedTextDisplay();
                }
            });
        });

        // 切换功能面板
        function switchFeature(feature) {
            // 更新当前功能
            currentFeature = feature;
            
            // 更新按钮状态
            document.querySelectorAll('.btn-feature').forEach(btn => {
                btn.classList.remove('active');
            });
            document.getElementById(`btn-${feature}`).classList.add('active');
            
            // 显示对应功能内容
            document.querySelectorAll('.feature-content').forEach(content => {
                content.classList.add('hidden');
            });
            document.getElementById(`feature-${feature}`).classList.remove('hidden');
            
            // 更新选中的文本显示
            updateSelectedTextDisplay();
        }

        // 更新选中的文本显示
        function updateSelectedTextDisplay() {
            const textDisplays = document.querySelectorAll('.feature-content .bg-gray-100');
            textDisplays.forEach(display => {
                if (selectedText) {
                    display.textContent = selectedText.length > 100 ? selectedText.substring(0, 100) + '...' : selectedText;
                } else {
                    display.textContent = '请在文档中选择要处理的文本...';
                }
            });
        }

        // 显示加载弹窗
        function showLoadingModal(title, message) {
            document.getElementById('loading-title').textContent = title || 'AI正在处理';
            document.getElementById('loading-message').textContent = message || '请稍候，AI正在生成内容...';
            document.getElementById('loading-modal').classList.remove('hidden');
        }

        // 隐藏加载弹窗
        function hideLoadingModal() {
            document.getElementById('loading-modal').classList.add('hidden');
        }

        // 显示结果弹窗
        function showResultModal(title, content) {
            document.getElementById('modal-title').textContent = title || 'AI生成结果';
            document.getElementById('modal-content').innerHTML = content;
            document.getElementById('result-modal').classList.remove('hidden');
            aiResults = content;
        }

        // 关闭结果弹窗
        function closeModal() {
            document.getElementById('result-modal').classList.add('hidden');
        }

        // 应用更改到文档
        function applyChanges() {
            const editor = document.getElementById('document-editor');
            
            // 如果有选中文本，替换选中的文本
            if (selectedText) {
                const selection = window.getSelection();
                if (selection.rangeCount > 0) {
                    const range = selection.getRangeAt(0);
                    range.deleteContents();
                    
                    // 创建一个临时div来解析HTML内容
                    const tempDiv = document.createElement('div');
                    tempDiv.innerHTML = aiResults;
                    
                    // 将解析后的内容添加到文档中
                    while (tempDiv.firstChild) {
                        range.insertNode(tempDiv.firstChild);
                    }
                    
                    selection.removeAllRanges();
                }
            } else {
                // 否则在光标位置插入内容
                const selection = window.getSelection();
                if (selection.rangeCount > 0) {
                    const range = selection.getRangeAt(0);
                    
                    // 创建一个临时div来解析HTML内容
                    const tempDiv = document.createElement('div');
                    tempDiv.innerHTML = aiResults;
                    
                    // 将解析后的内容添加到文档中
                    while (tempDiv.firstChild) {
                        range.insertNode(tempDiv.firstChild);
                    }
                    
                    selection.removeAllRanges();
                }
            }
            
            closeModal();
        }

        // 文本生成功能
        function generateContent() {
            const prompt = document.querySelector('#feature-generate textarea').value.trim();
            const type = document.querySelector('#feature-generate select').value;
            
            if (!prompt) {
                alert('请输入生成提示');
                return;
            }
            
            showLoadingModal('文本生成中', `正在生成${type}内容，请稍候...`);
            
            // 模拟API调用延迟
            setTimeout(() => {
                let result = '';
                
                // 根据不同类型生成不同的内容
                switch (type) {
                    case '总结':
                        result = `<h3>文档总结</h3>
                        <p>根据您提供的提示，以下是文档的主要内容总结：</p>
                        <ul>
                            <li>这是一个关于飞书文档AI助手的使用指南</li>
                            <li>AI助手提供了文本生成、信息提取、翻译和格式优化功能</li>
                            <li>用户可以通过选择文本或输入提示来使用AI功能</li>
                            <li>生成的内容可以直接应用到文档中</li>
                        </ul>
                        <p>总结完毕，希望对您有所帮助！</p>`;
                        break;
                    case '大纲':
                        result = `<h3>文档大纲</h3>
                        <ol>
                            <li>
                                <strong>飞书文档AI助手介绍</strong>
                                <ul>
                                    <li>什么是AI助手</li>
                                    <li>AI助手的主要功能</li>
                                    <li>如何访问AI助手</li>
                                </ul>
                            </li>
                            <li>
                                <strong>文本生成功能</strong>
                                <ul>
                                    <li>生成类型介绍</li>
                                    <li>如何编写有效的提示</li>
                                    <li>生成结果的应用</li>
                                </ul>
                            </li>
                            <li>
                                <strong>信息提取功能</strong>
                                <ul>
                                    <li>提取类型说明</li>
                                    <li>选择文本的技巧</li>
                                    <li>提取结果的使用</li>
                                </ul>
                            </li>
                            <li>
                                <strong>翻译功能</strong>
                                <ul>
                                    <li>支持的语言</li>
                                    <li>翻译质量保证</li>
                                    <li>批量翻译技巧</li>
                                </ul>
                            </li>
                            <li>
                                <strong>格式优化功能</strong>
                                <ul>
                                    <li>格式优化选项</li>
                                    <li>自定义格式设置</li>
                                    <li>格式模板的使用</li>
                                </ul>
                            </li>
                        </ol>`;
                        break;
                    case '邮件':
                        result = `<h3>商务邮件</h3>
                        <p>主题：关于飞书文档AI助手功能培训的邀请</p>
                        <p>尊敬的团队成员：</p>
                        <p>希望这封邮件找到您一切安好。</p>
                        <p>我很高兴地通知大家，我们将在下周举办一场关于飞书文档AI助手功能的培训会议。这个强大的工具可以帮助我们显著提高文档创作和编辑效率。</p>
                        <p><strong>培训详情：</strong></p>
                        <ul>
                            <li>日期：2023年7月15日（星期五）</li>
                            <li>时间：下午2:00-3:30</li>
                            <li>地点：线上会议室（会议链接将另行发送）</li>
                            <li>内容：AI助手功能介绍、实际操作演示、问答环节</li>
                        </ul>
                        <p>请各位提前安排好工作，准时参加。培训结束后，我们将提供操作手册和常见问题解答文档。</p>
                        <p>如有任何疑问，请随时与我联系。</p>
                        <p>期待与大家共同学习和进步！</p>
                        <p>此致</p>
                        <p>敬礼</p>
                        <p>张三<br>团队负责人</p>`;
                        break;
                    case '报告':
                        result = `<h3>月度工作报告</h3>
                        <h4>2023年6月</h4>
                        <p><strong>一、工作概述</strong></p>
                        <p>本月主要完成了以下工作内容：</p>
                        <ul>
                            <li>完成了项目A的需求分析和设计文档编写</li>
                            <li>参与了项目B的开发和测试工作</li>
                            <li>组织了团队内部的技术分享会议</li>
                            <li>优化了工作流程，提高了团队协作效率</li>
                        </ul>
